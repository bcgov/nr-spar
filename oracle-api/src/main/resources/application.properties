# Server and application
spring.application.name = spar-oracle-api
server.port = ${SERVER_PORT:8090}
server.error.include-message = always
server.shutdown = graceful
app.version = @project.version@

# OpenSearch settings
nr-spar-ecs-version = 8.11
nr-spar-oracle-api-env-opensearch = ${OPENSEARCH_ENV:development}
nr-spar-team-email-address = FSA.Delivery.Team2@gov.bc.ca

# Certificate for the Database
ca.bc.gov.nrs.oracle.keystore = ${ORACLEDB_KEYSTORE:jssecacerts-path}
ca.bc.gov.nrs.oracle.secret = ${ORACLEDB_SECRET:changeit}
ca.bc.gov.nrs.oracle.host = ${DATABASE_HOST}

# Read-only data source (SPAR)
spring.datasource.read.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.read.url=jdbc:oracle:thin:@tcps://${DATABASE_HOST}:${DATABASE_PORT}/${SERVICE_NAME}?javax.net.ssl.trustStore=${ca.bc.gov.nrs.oracle.keystore}&javax.net.ssl.trustStorePassword=${ca.bc.gov.nrs.oracle.secret}&oracle.net.ssl_server_dn_match=false
spring.datasource.read.username=${DATABASE_USER}
spring.datasource.read.password=${DATABASE_PASSWORD}
spring.datasource.read.hikari.pool-name=NrSparOracleRead
spring.datasource.read.hikari.connection-timeout=10000
spring.datasource.read.hikari.maximum-pool-size=2
spring.datasource.read.hikari.minimum-idle=1
spring.datasource.read.hikari.max-lifetime=300000
spring.datasource.read.hikari.validation-timeout=5000
spring.datasource.read.hikari.register-mbeans=true
spring.datasource.read.hikari.keepalive-time=60000

# Read-write data source (CONSEP)
spring.datasource.readwrite.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.readwrite.url=jdbc:oracle:thin:@tcps://${DATABASE_HOST}:${DATABASE_PORT}/${SERVICE_NAME}?javax.net.ssl.trustStore=${ca.bc.gov.nrs.oracle.keystore}&javax.net.ssl.trustStorePassword=${ca.bc.gov.nrs.oracle.secret}&oracle.net.ssl_server_dn_match=false
spring.datasource.readwrite.username=${DATABASE_WRITE_USER}
spring.datasource.readwrite.password=${DATABASE_WRITE_PASSWORD}
spring.datasource.readwrite.hikari.pool-name=NrSparOracleReadWrite
spring.datasource.readwrite.hikari.connection-timeout=10000
spring.datasource.readwrite.hikari.maximum-pool-size=2
spring.datasource.readwrite.hikari.minimum-idle=1
spring.datasource.readwrite.hikari.max-lifetime=300000
spring.datasource.readwrite.hikari.validation-timeout=5000
spring.datasource.readwrite.hikari.register-mbeans=true
spring.datasource.readwrite.hikari.keepalive-time=60000

# JPA / Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# Actuator and ops
management.endpoint.health.show-details = always

# Native Cloud
springdoc.enable-native-support = true
# https://github.com/quarkusio/quarkus/wiki/Migration-Guide-3.2
quarkus.native.additional-build-args=-march=native

# Others
nr-spar-oracle-api.version = ${NR_SPAR_ORACLE_API_VERSION:local}
server.allowed.cors.origins = ${ALLOWED_ORIGINS:#{'http://localhost:300*, http://127.*'}}

# FAM
spring.security.oauth2.resourceserver.jwt.issuer-uri = ${AWS_COGNITO_ISSUER_URI:aws-cognito-any-url.com}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri = ${AWS_COGNITO_ISSUER_URI:aws-cognito-any-url.com}/.well-known/jwks.json
