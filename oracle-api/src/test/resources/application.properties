# Server and application
spring.profiles.active = dev
spring.application.name = spar-oracle-api
server.port = 8090
logging.level.root = INFO
app.version = 0.0.1

# Read-only data source (SPAR) - H2 for tests
spring.datasource.read.driver-class-name=org.h2.Driver
spring.datasource.read.url=jdbc:h2:mem:oracledb;DB_CLOSE_ON_EXIT=TRUE
spring.datasource.read.username=sa
spring.datasource.read.password=

# Read-write data source (CONSEP) - same H2 for tests
spring.datasource.readwrite.driver-class-name=org.h2.Driver
spring.datasource.readwrite.url=jdbc:h2:mem:oracledb;DB_CLOSE_ON_EXIT=TRUE
spring.datasource.readwrite.username=sa
spring.datasource.readwrite.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Actuator and ops
management.endpoint.health.show-details = always

# Others
nr-spar-oracle-api.version = ${NR_SPAR_ORACLE_API_VERSION:test}
server.allowed.cors.origins = ${ALLOWED_ORIGINS:#{'http://127.*, http://localhost:300*'}}

# FAM
spring.security.oauth2.resourceserver.jwt.issuer-uri = https://aws-cognito-issuer-uri.aws.com
spring.security.oauth2.resourceserver.jwt.jwk-set-uri = https://aws-cognito-issuer-uri.aws.com/.well-known/jwks.json
